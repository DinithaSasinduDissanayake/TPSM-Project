global:
  stop_on_first_fail: false
  timeout_seconds: 300
  parallel_workers: 1
classification:
  split_method: repeated_kfold
  folds: 10
  repeats: 1
  metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
  - logloss
  model_pairs:
  - single: logistic_regression
    ensemble: gradient_boosting
  - single: decision_tree
    ensemble: adaboost
  - single: naive_bayes
    ensemble: gradient_boosting
  datasets:
  - id: german_credit
    source: uci
    path: data/classification/german_credit.csv
    url: https://archive.ics.uci.edu/ml/machine-learning-databases/statlog/german/german.data
    target: Risk
    force_binary: true
    binary_positive_vals:
    - '1'
    - good
    header_names:
    - Status
    - Duration
    - CreditHistory
    - Purpose
    - CreditAmount
    - Savings
    - Employment
    - InstallmentRate
    - Residence
    - Housing
    - ExistingCredits
    - Job
    - Dependents
    - Telephone
    - Foreign
    - Risk
