global:
  stop_on_first_fail: false
  timeout_seconds: 300
  parallel_workers: 1
classification:
  split_method: repeated_kfold
  folds: 10
  repeats: 1
  metrics:
  - accuracy
  - precision
  - recall
  - f1
  - roc_auc
  - logloss
  model_pairs:
  - single: logistic_regression
    ensemble: gradient_boosting
  - single: decision_tree
    ensemble: adaboost
  - single: naive_bayes
    ensemble: gradient_boosting
  datasets:
  - id: letter_recognition
    source: uci
    path: data/classification/letter_recognition.csv
    url: https://archive.ics.uci.edu/ml/machine-learning-databases/letter-recognition/letter-recognition.data
    target: lettr
    separator: ','
    force_binary: false
    header_names:
    - lettr
    - x_box
    - y_box
    - width
    - high
    - onpix
    - x_bar
    - y_bar
    - x2bar
    - y2bar
    - xybar
    - x2ybr
    - xy2br
    - x_ege
    - xegvy
    - y_ege
    - yegvx
