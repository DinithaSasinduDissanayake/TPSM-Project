global:
  stop_on_first_fail: false
  timeout_seconds: 120
  parallel_workers: 1

classification:
  split_method: repeated_kfold
  folds: 2
  repeats: 1
  metrics:
    - accuracy
    - f1
  model_pairs:
    - single: logistic_regression
      ensemble: gradient_boosting
  datasets:
    - id: heart_disease
      source: uci
      path: data/classification/heart_disease.csv
      target: num
      force_binary: true
      binary_threshold: 0

regression:
  split_method: repeated_kfold
  folds: 2
  repeats: 1
  metrics:
    - rmse
    - mae
  model_pairs:
    - single: linear_regression
      ensemble: gradient_boosting_regressor
  datasets:
    - id: insurance
      source: kaggle
      path: data/regression/insurance.csv
      target: charges
