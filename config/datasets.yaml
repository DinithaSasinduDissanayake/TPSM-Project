# TPSM Pipeline Configuration
# Version: 1.0

# Global settings
global:
  stop_on_first_fail: false
  timeout_seconds: 300
  parallel_workers: 2

# Classification Task
classification:
  split_method: repeated_kfold
  folds: 10
  repeats: 5
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
    - logloss
  model_pairs:
    - single: logistic_regression
      ensemble: gradient_boosting
    - single: decision_tree
      ensemble: adaboost
    - single: naive_bayes
      ensemble: gradient_boosting
  datasets:
    - id: heart_disease
      source: uci
      path: data/classification/heart_disease.csv
      url: https://archive.ics.uci.edu/static/public/45/data.csv
      target: num
      force_binary: true
      binary_threshold: 0

    - id: breast_cancer
      source: uci
      path: data/classification/breast_cancer.csv
      url: https://archive.ics.uci.edu/static/public/17/data.csv
      target: Diagnosis

    - id: bank_marketing
      source: uci
      path: data/classification/bank_marketing.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00222/bank.zip
      target: "y"
      exclude_cols:
        - duration
      zip_file: bank-full.csv

    - id: adult_census
      source: uci
      path: data/classification/adult_census.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data
      target: income
      separator: ","
      force_binary: true
      binary_positive_vals:
        - ">50K"
      header_names:
        - age
        - workclass
        - fnlwg
        - education
        - education_num
        - marital_status
        - occupation
        - relationship
        - race
        - sex
        - capital_gain
        - capital_loss
        - hours_per_week
        - native_country
        - income

    - id: magic_gamma
      source: uci
      path: data/classification/magic_gamma.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/magic/magic04.data
      target: class
      separator: ","
      header_names:
        - fLength
        - fWidth
        - fSize
        - fConc
        - fConc1
        - fAsym
        - fM3Long
        - fM3Trans
        - fAlpha
        - fDist
        - class

    - id: letter_recognition
      source: uci
      path: data/classification/letter_recognition.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/letter-recognition/letter-recognition.data
      target: lettr
      separator: ","
      force_binary: false
      header_names:
        - lettr
        - x_box
        - y_box
        - width
        - high
        - onpix
        - x_bar
        - y_bar
        - x2bar
        - y2bar
        - xybar
        - x2ybr
        - xy2br
        - x_ege
        - xegvy
        - y_ege
        - yegvx

    - id: german_credit
      source: uci
      path: data/classification/german_credit.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/statlog/german/german.data
      target: Risk
      force_binary: true
      binary_positive_vals:
        - "1"
        - "good"
      separator: " "
      header_names:
        - Status
        - Duration
        - CreditHistory
        - Purpose
        - CreditAmount
        - Savings
        - Employment
        - InstallmentRate
        - Residence
        - Housing
        - ExistingCredits
        - Job
        - Dependents
        - Telephone
        - Foreign
        - Risk

    - id: online_shoppers
      source: uci
      path: data/classification/online_shoppers.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00468/online_shoppers_intention.csv
      target: Revenue

    - id: dry_bean
      source: uci
      path: data/classification/dry_bean.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00602/Dry_Bean_Dataset.xlsx
      target: Class
      force_binary: false

    - id: avila
      source: uci
      path: data/classification/avila.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00459/Avila.zip
      target: class
      zip_file: avila-tr.txt
      header_names:
        - F1
        - F2
        - F3
        - F4
        - F5
        - F6
        - F7
        - F8
        - F9
        - F10
        - class
      force_binary: false

# Regression Task
regression:
  split_method: repeated_kfold
  folds: 10
  repeats: 5
  metrics:
    - rmse
    - mae
    - r2
    - mape
  model_pairs:
    - single: linear_regression
      ensemble: gradient_boosting_regressor
    - single: decision_tree_regressor
      ensemble: gradient_boosting_regressor
    - single: svr
      ensemble: gradient_boosting_regressor
  datasets:
    - id: insurance
      source: kaggle
      path: data/regression/insurance.csv
      url: https://raw.githubusercontent.com/stedy/Machine-Learning-with-R-datasets/master/insurance.csv
      target: charges

    - id: housing_prices
      source: kaggle
      path: data/regression/housing_prices.csv
      url: https://raw.githubusercontent.com/datasets/house-prices-uk/main/data/data.csv
      target: Price..All.

    - id: wine_quality
      source: uci
      path: data/regression/wine_quality.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/wine-quality/winequality-red.csv
      target: quality

    - id: abalone
      source: uci
      path: data/regression/abalone.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/abalone/abalone.data
      target: Rings
      separator: ","
      header_names:
        - Sex
        - Length
        - Diameter
        - Height
        - Whole_weight
        - Shucked_weight
        - Viscera_weight
        - Shell_weight
        - Rings

    - id: concrete_strength
      source: uci
      path: data/regression/concrete_strength.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/concrete/compressive/Concrete_Data.xls
      target: Concrete.compressive.strength.MPa..megapascals.
      rename_target_from: Strength

    - id: ccpp
      source: uci
      path: data/regression/ccpp.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00294/CCPP.zip
      target: PE
      zip_file: CCPP/Folds5x2_pp.xlsx

    - id: bike_sharing
      source: uci
      path: data/regression/bike_sharing.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00275/Bike-Sharing-Dataset.zip
      target: cnt
      zip_file: hour.csv
      exclude_cols:
        - casual
        - registered

    - id: energy_efficiency
      source: uci
      path: data/regression/energy_efficiency.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00242/ENB2012_data.xlsx
      target: Y1
      exclude_cols:
        - Y2

    - id: airfoil
      source: uci
      path: data/regression/airfoil.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00291/airfoil_self_noise.dat
      target: ScaledSoundPressureLevel
      header_names:
        - Frequency
        - AngleOfAttack
        - ChordLength
        - FreeStreamVelocity
        - SuctionSideDisplacement
        - ScaledSoundPressureLevel

# Timeseries Task
timeseries:
  split_method: rolling_origin
  splits: 10
  metrics:
    - rmse
    - mae
    - mape
    - smape
  model_pairs:
    - single: arima
      ensemble: gbm_lag
    - single: exp_smoothing
      ensemble: gbm_lag
  datasets:
    - id: melbourne_temp
      source: other
      path: data/timeseries/melbourne_temp.csv
      url: https://raw.githubusercontent.com/jbrownlee/Datasets/master/daily-min-temperatures.csv
      target: Temp
      time_col: Date

    - id: electric_production
      source: other
      path: data/timeseries/electric_production.csv
      url: https://raw.githubusercontent.com/Rudra-23/Electric-Production-Forecast/main/Electric_Production.csv
      target: Value
      time_col: DATE

    - id: air_quality
      source: uci
      path: data/timeseries/air_quality.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00360/AirQualityUCI.zip
      target: CO.GT
      time_col: Date
      exog_cols:
        - NO2.GT
        - T
      separator: ";"
      rename_target_from: "CO(GT)"

    - id: beijing_pm25
      source: uci
      path: data/timeseries/beijing_pm25.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00381/PRSA_data_2010.1.1-2014.12.31.csv
      target: pm2.5
      time_col: date
      exog_cols:
        - TEMP
        - PRES

    - id: metro_traffic
      source: uci
      path: data/timeseries/metro_traffic.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00492/Metro_Interstate_Traffic_Volume.csv.gz
      target: traffic_volume
      time_col: date_time
      exog_cols:
        - holiday
        - temp

    - id: household_power
      source: uci
      path: data/timeseries/household_power.csv
      url: https://archive.ics.uci.edu/ml/machine-learning-databases/00235/household_power_consumption.zip
      target: Global_active_power
      time_col: Date
      exog_cols:
        - Global_reactive_power
        - Voltage
      separator: ";"
      exclude_cols:
        - Time
      na_strings: "?"
      max_rows: 50000
